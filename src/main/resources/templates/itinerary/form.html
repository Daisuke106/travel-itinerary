<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅程作成 | 旅行しおり</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4ff; }
        .form-card { max-width: 640px; margin: 2rem auto; background: white;
                     border-radius: 20px; padding: 2.5rem;
                     box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .form-label { font-weight: 600; color: #374151; }
        .form-control, .form-select { border-radius: 10px; border-color: #e5e7eb; padding: 0.6rem 1rem; }
        .form-control:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.15); }
        .btn-submit { background: linear-gradient(135deg, #1a56db, #0891b2);
                      border: none; border-radius: 10px; padding: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2 class="fw-bold mb-1">
            <i class="bi bi-pencil-square me-2 text-primary"></i>
            <span th:text="${itinerary.id != null} ? '旅程を編集' : '新しい旅程を作成'">新しい旅程を作成</span>
        </h2>
        <p class="text-muted mb-4">旅程の基本情報を入力してください</p>

        <!-- エラーメッセージ -->
        <div th:if="${errorMessage}" class="alert alert-danger rounded-3">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="${itinerary.id != null} ? @{/itineraries/{id}(id=${itinerary.id})} : @{/itineraries}"
              th:object="${itinerary}" method="post">

            <!-- タイトル -->
            <div class="mb-3">
                <label class="form-label" for="title">
                    <i class="bi bi-bookmark me-1 text-primary"></i>旅行タイトル
                </label>
                <input type="text" class="form-control" id="title"
                       th:field="*{title}" placeholder="例: 四国一周の旅">
                <div class="text-danger small mt-1" th:errors="*{title}"></div>
            </div>

            <!-- 出発地 -->
            <div class="mb-3">
                <label class="form-label" for="departureLocation">
                    <i class="bi bi-geo-alt me-1 text-primary"></i>出発地
                </label>
                <input type="text" class="form-control" id="departureLocation"
                       th:field="*{departureLocation}" placeholder="例: 東京">
                <div class="text-danger small mt-1" th:errors="*{departureLocation}"></div>
            </div>

            <!-- 日程 -->
            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label" for="startDate">
                        <i class="bi bi-calendar-event me-1 text-primary"></i>開始日
                    </label>
                    <input type="date" class="form-control" id="startDate"
                           th:field="*{startDate}">
                    <div class="text-danger small mt-1" th:errors="*{startDate}"></div>
                </div>
                <div class="col-6">
                    <label class="form-label" for="endDate">
                        <i class="bi bi-calendar-check me-1 text-primary"></i>終了日
                    </label>
                    <input type="date" class="form-control" id="endDate"
                           th:field="*{endDate}">
                    <div class="text-danger small mt-1" th:errors="*{endDate}"></div>
                </div>
            </div>

            <!-- 人数 -->
            <div class="mb-3">
                <label class="form-label" for="memberCount">
                    <i class="bi bi-people me-1 text-primary"></i>メンバー人数
                </label>
                <input type="number" class="form-control" id="memberCount"
                       th:field="*{memberCount}" min="1" max="20">
            </div>

            <!-- メモ -->
            <div class="mb-4">
                <label class="form-label" for="notes">
                    <i class="bi bi-chat-text me-1 text-primary"></i>メモ・備考 (任意)
                </label>
                <textarea class="form-control" id="notes" th:field="*{notes}"
                          rows="3" placeholder="旅行のテーマや注意事項など"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-submit">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${itinerary.id != null} ? '更新する' : '旅程を作成する'">旅程を作成する</span>
            </button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/itineraries}" class="text-muted text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>一覧に戻る
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
