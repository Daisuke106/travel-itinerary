<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${itinerary.title} + ' | 旅行しおり'">旅程詳細</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4ff; }
        .hero { background: linear-gradient(135deg, #1a56db 0%, #0891b2 100%);
                color: white; padding: 2.5rem 0; margin-bottom: 2rem; }
        .day-card { border: none; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.08);
                    margin-bottom: 1.5rem; }
        .day-badge { width: 48px; height: 48px; border-radius: 50%;
                     background: linear-gradient(135deg, #1a56db, #0891b2);
                     color: white; display: flex; align-items: center; justify-content: center;
                     font-weight: bold; font-size: 0.9rem; flex-shrink: 0; }
        .spot-row { padding: 0.75rem; border-radius: 10px; background: #f8f9ff;
                    margin-bottom: 0.5rem; border: 1px solid #e8eaff; }
        /* ▼ Week2で追加: ホバー時に操作ボタンを表示 */
        .spot-actions { opacity: 0; transition: opacity 0.15s; }
        .spot-row:hover .spot-actions { opacity: 1; }
        .time-badge { font-size: 0.78rem; color: #6b7280; min-width: 60px; }
        .info-chip { background: white; border-radius: 20px; padding: 0.4rem 1rem;
                     font-size: 0.85rem; border: 1px solid #e5e7eb; }
        .add-spot-btn { border: 2px dashed #c7d2fe; color: #6366f1; background: transparent;
                        border-radius: 10px; padding: 0.5rem; font-size: 0.85rem;
                        transition: all 0.2s; width: 100%; }
        .add-spot-btn:hover { border-color: #6366f1; background: #eef2ff; color: #4f46e5; }
        .move-btn { padding: 2px 6px; font-size: 0.75rem; line-height: 1; }
    </style>
</head>
<body>

<!-- ヒーローヘッダー（Week1と同じ） -->
<div class="hero">
    <div class="container">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <a th:href="@{/itineraries}" class="text-white-50 text-decoration-none small">
                    <i class="bi bi-arrow-left me-1"></i>一覧に戻る
                </a>
                <h1 class="fw-bold mt-2 mb-2" th:text="${itinerary.title}">四国一周旅行</h1>
                <div class="d-flex gap-3 flex-wrap">
                    <span class="info-chip text-dark">
                        <i class="bi bi-geo-alt me-1 text-primary"></i>
                        <span th:text="${itinerary.departureLocation}">東京</span> 発
                    </span>
                    <span class="info-chip text-dark">
                        <i class="bi bi-calendar-range me-1 text-primary"></i>
                        <span th:text="${#temporals.format(itinerary.startDate, 'MM/dd')}">07/20</span>
                        〜
                        <span th:text="${#temporals.format(itinerary.endDate, 'MM/dd')}">07/25</span>
                        (<span th:text="${itinerary.tripDays}">6</span>日間)
                    </span>
                    <span class="info-chip text-dark">
                        <i class="bi bi-people me-1 text-primary"></i>
                        <span th:text="${itinerary.memberCount}">2</span>名
                    </span>
                </div>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <!-- Week2で追加: スポット管理リンク -->
                <a th:href="@{/spots}" class="btn btn-light btn-sm rounded-3">
                    <i class="bi bi-pin-map me-1"></i>スポット管理
                </a>
                <a th:href="@{/itineraries/{id}/edit(id=${itinerary.id})}"
                   class="btn btn-light btn-sm rounded-3">
                    <i class="bi bi-pencil me-1"></i>編集
                </a>
                <form th:action="@{/itineraries/{id}/delete(id=${itinerary.id})}"
                      method="post" onsubmit="return confirm('この旅程を削除しますか？')">
                    <button type="submit" class="btn btn-outline-light btn-sm rounded-3">
                        <i class="bi bi-trash me-1"></i>削除
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <!-- フラッシュメッセージ -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible rounded-3" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible rounded-3" role="alert">
        <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- メモ -->
    <div th:if="${itinerary.notes}" class="alert alert-info rounded-3 mb-4">
        <i class="bi bi-chat-text me-2"></i><span th:text="${itinerary.notes}"></span>
    </div>

    <!-- 日程リスト -->
    <div th:each="day : ${itinerary.days}" class="card day-card">
        <div class="card-body">
            <!-- 日程ヘッダー -->
            <div class="d-flex align-items-center gap-3 mb-3">
                <div class="day-badge">
                    <span th:text="${day.dayNumber}">1</span>日
                </div>
                <div class="flex-grow-1">
                    <h5 class="mb-0 fw-bold" th:text="${day.title}">1日目</h5>
                    <small class="text-muted"
                           th:text="${#temporals.format(day.date, 'yyyy年MM月dd日 (E)', #locale)}">
                    </small>
                </div>
            </div>

            <!-- ▼ Week2で修正: スポット訪問一覧 + 並び替えボタン -->
            <div th:if="${#lists.isEmpty(day.spotVisits)}" class="text-muted small ps-2 mb-2">
                スポットをまだ追加していません
            </div>

            <!--
                【th:each でspotVisitとインデックスを同時に取得】
                th:each="visit, stat : ${day.spotVisits}"
                stat.index  → 0始まりのインデックス
                stat.count  → 1始まりのカウント
                stat.first  → 最初の要素か
                stat.last   → 最後の要素か
                ↑これを使って「最初の要素は↑ボタンを非表示」などができる
            -->
            <div th:each="visit, stat : ${day.spotVisits}"
                 class="spot-row d-flex align-items-center gap-3">

                <!-- 到着時刻 -->
                <span class="time-badge">
                    <i class="bi bi-clock me-1"></i>
                    <span th:text="${visit.arrivalTime != null}
                                  ? ${#temporals.format(visit.arrivalTime, 'HH:mm')}
                                  : '--:--'">10:00</span>
                </span>

                <!-- スポット情報 -->
                <div class="flex-grow-1">
                    <span class="fw-semibold" th:text="${visit.spot.name}">栗林公園</span>
                    <span th:if="${visit.spot.address}" class="text-muted small ms-2"
                          th:text="${visit.spot.address}"></span>
                    <div th:if="${visit.memo}" class="text-muted small mt-1">
                        <i class="bi bi-sticky me-1"></i><span th:text="${visit.memo}"></span>
                    </div>
                </div>

                <!-- 予算 -->
                <span th:if="${visit.budget}" class="badge bg-success bg-opacity-10 text-success">
                    ¥<span th:text="${#numbers.formatInteger(visit.budget, 0, 'COMMA')}">1,000</span>
                </span>

                <!-- ▼ Week2で追加: 操作ボタン（ホバーで表示） -->
                <div class="spot-actions d-flex gap-1 align-items-center">
                    <!-- 上に移動（最初の要素は非表示） -->
                    <form th:if="${!stat.first}"
                          th:action="@{/days/{dayId}/visits/{visitId}/move-up(dayId=${day.id}, visitId=${visit.id})}"
                          method="post">
                        <input type="hidden" name="itineraryId" th:value="${itinerary.id}">
                        <button type="submit" class="btn btn-sm btn-outline-secondary move-btn"
                                title="上に移動">
                            <i class="bi bi-arrow-up"></i>
                        </button>
                    </form>

                    <!-- 下に移動（最後の要素は非表示） -->
                    <form th:if="${!stat.last}"
                          th:action="@{/days/{dayId}/visits/{visitId}/move-down(dayId=${day.id}, visitId=${visit.id})}"
                          method="post">
                        <input type="hidden" name="itineraryId" th:value="${itinerary.id}">
                        <button type="submit" class="btn btn-sm btn-outline-secondary move-btn"
                                title="下に移動">
                            <i class="bi bi-arrow-down"></i>
                        </button>
                    </form>

                    <!-- 削除 -->
                    <form th:action="@{/days/{dayId}/visits/{visitId}/remove(dayId=${day.id}, visitId=${visit.id})}"
                          method="post"
                          onsubmit="return confirm('このスポットを削除しますか？')">
                        <input type="hidden" name="itineraryId" th:value="${itinerary.id}">
                        <button type="submit" class="btn btn-sm btn-outline-danger move-btn"
                                title="削除">
                            <i class="bi bi-x"></i>
                        </button>
                    </form>
                </div>
            </div>

            <!-- ▼ Week2で追加: スポット追加ボタン -->
            <div class="mt-2">
                <a th:href="@{/days/{dayId}/add-spot(dayId=${day.id}, itineraryId=${itinerary.id})}"
                   class="add-spot-btn d-block text-center text-decoration-none">
                    <i class="bi bi-plus-circle me-1"></i>スポットを追加
                </a>
            </div>

            <!-- 日程メモ -->
            <div th:if="${day.memo}" class="mt-3 p-2 bg-light rounded-3">
                <small class="text-muted">
                    <i class="bi bi-sticky me-1"></i><span th:text="${day.memo}"></span>
                </small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
