<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>スポット登録 | 旅行しおり</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f0f4ff;
      }
      .form-card {
        max-width: 640px;
        margin: 2rem auto;
        background: white;
        border-radius: 20px;
        padding: 2.5rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      .form-control,
      .form-select {
        border-radius: 10px;
        border-color: #e5e7eb;
      }
      .form-control:focus,
      .form-select:focus {
        border-color: #0f6e56;
        box-shadow: 0 0 0 3px rgba(15, 110, 86, 0.15);
      }
      .btn-submit {
        background: linear-gradient(135deg, #0f6e56, #1d9e75);
        border: none;
        border-radius: 10px;
        padding: 0.75rem;
        font-weight: 600;
      }
      .map-hint {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 10px;
        padding: 0.75rem 1rem;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="form-card">
        <h2 class="fw-bold mb-1">
          <i class="bi bi-pin-map me-2 text-success"></i>
          <span
            th:text="${spot.id != null} ? 'スポットを編集' : 'スポットを登録'"
            >スポットを登録</span
          >
        </h2>
        <p class="text-muted mb-4">
          観光スポット・飲食店・宿泊施設などを登録できます
        </p>

        <!--
            【th:object と th:field の仕組み】
            th:object="${spot}"  → このフォーム全体でspotオブジェクトを参照する宣言
            th:field="*{name}"  → spot.name フィールドにバインド
                                   id="name" name="name" value="..." を自動生成してくれる
        -->
        <form
          th:action="${spot.id != null} ? @{/spots/{id}(id=${spot.id})} : @{/spots}"
          th:object="${spot}"
          method="post"
        >
          <div class="mb-3">
            <label class="form-label fw-semibold" for="name">
              <i class="bi bi-geo-alt me-1 text-success"></i>スポット名
              <span class="text-danger">*</span>
            </label>
            <input
              type="text"
              class="form-control"
              id="name"
              th:field="*{name}"
              placeholder="例: 道後温泉本館"
            />
            <div class="text-danger small mt-1" th:errors="*{name}"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" for="category">
              <i class="bi bi-tag me-1 text-success"></i>カテゴリ
            </label>
            <!--
                    【th:field と select/option】
                    th:field="*{category}" でselectedが自動管理される。
                    th:value には enum の name()（文字列）を渡す。
                -->
            <select class="form-select" id="category" th:field="*{category}">
              <option
                th:each="cat : ${categories}"
                th:value="${cat.name()}"
                th:text="${cat.displayName}"
              ></option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" for="address">
              <i class="bi bi-house me-1 text-success"></i>住所
            </label>
            <input
              type="text"
              class="form-control"
              id="address"
              th:field="*{address}"
              placeholder="例: 愛媛県松山市道後湯之町5-6"
            />
          </div>

          <!-- 緯度・経度 (地図連携用) -->
          <div class="map-hint mb-3">
            <i class="bi bi-info-circle me-1 text-success"></i>
            緯度・経度は Google Maps でスポットを右クリック →
            「この場所について」で確認できます
          </div>
          <div class="row mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold" for="latitude">緯度</label>
              <input
                type="number"
                step="0.0001"
                class="form-control"
                id="latitude"
                th:field="*{latitude}"
                placeholder="例: 33.8522"
              />
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" for="longitude">経度</label>
              <input
                type="number"
                step="0.0001"
                class="form-control"
                id="longitude"
                th:field="*{longitude}"
                placeholder="例: 132.7858"
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" for="description">
              <i class="bi bi-chat-text me-1 text-success"></i>説明・メモ
            </label>
            <textarea
              class="form-control"
              id="description"
              th:field="*{description}"
              rows="3"
              placeholder="スポットの説明や見どころを書いてください"
            ></textarea>
          </div>

          <div class="row mb-4">
            <div class="col-6">
              <label class="form-label fw-semibold" for="websiteUrl"
                >公式サイトURL</label
              >
              <input
                type="url"
                class="form-control"
                id="websiteUrl"
                th:field="*{websiteUrl}"
                placeholder="https://..."
              />
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" for="phoneNumber"
                >電話番号</label
              >
              <input
                type="tel"
                class="form-control"
                id="phoneNumber"
                th:field="*{phoneNumber}"
                placeholder="例: 089-921-5141"
              />
            </div>
          </div>

          <button type="submit" class="btn btn-success w-100 btn-submit">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${spot.id != null} ? '更新する' : '登録する'"
              >登録する</span
            >
          </button>
        </form>

        <div class="text-center mt-3">
          <a th:href="@{/spots}" class="text-muted text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>スポット一覧へ
          </a>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
