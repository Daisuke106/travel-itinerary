<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>スポット一覧 | 旅行しおり</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f0f4ff;
      }
      .page-header {
        background: linear-gradient(135deg, #0f6e56 0%, #1d9e75 100%);
        color: white;
        padding: 2rem 0;
        margin-bottom: 2rem;
      }
      .card {
        border: none;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      }
      .category-badge {
        font-size: 0.72rem;
        padding: 3px 8px;
        border-radius: 12px;
      }
      .search-bar {
        background: white;
        border-radius: 12px;
        padding: 1.2rem 1.5rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        margin-bottom: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <div class="container d-flex justify-content-between align-items-center">
        <div>
          <a
            th:href="@{/itineraries}"
            class="text-white-50 text-decoration-none small"
          >
            <i class="bi bi-arrow-left me-1"></i>旅程一覧へ
          </a>
          <h1 class="fw-bold mt-1 mb-0">
            <i class="bi bi-pin-map me-2"></i>スポット管理
          </h1>
        </div>
        <a th:href="@{/spots/new}" class="btn btn-light fw-semibold rounded-3">
          <i class="bi bi-plus-circle me-1"></i>スポットを登録
        </a>
      </div>
    </div>

    <div class="container">
      <!-- フラッシュメッセージ -->
      <div
        th:if="${successMessage}"
        class="alert alert-success alert-dismissible rounded-3"
        role="alert"
      >
        <i class="bi bi-check-circle-fill me-2"></i
        ><span th:text="${successMessage}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>

      <!-- 検索フォーム -->
      <!--
        【Thymeleaf の th:action と th:value】
        th:action="@{/spots}"  → URLを動的に生成（コンテキストパスも自動付与）
        th:value="${keyword}"   → サーバーから渡された変数をinputのvalueにセット
    -->
      <div class="search-bar">
        <form
          th:action="@{/spots}"
          method="get"
          class="d-flex gap-2 align-items-end flex-wrap"
        >
          <div class="flex-grow-1">
            <label class="form-label small text-muted mb-1"
              >スポット名で検索</label
            >
            <input
              type="text"
              name="keyword"
              class="form-control rounded-3"
              th:value="${keyword}"
              placeholder="例: 道後温泉"
            />
          </div>
          <div>
            <label class="form-label small text-muted mb-1">カテゴリ</label>
            <select name="category" class="form-select rounded-3">
              <option value="">すべて</option>
              <!--
                        th:each でカテゴリ選択肢を動的に生成。
                        th:selected は selectedCategory と一致するときに selected属性を付ける。
                    -->
              <option
                th:each="cat : ${categories}"
                th:value="${cat.name()}"
                th:text="${cat.displayName}"
                th:selected="${cat == selectedCategory}"
              ></option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary rounded-3">
            <i class="bi bi-search me-1"></i>検索
          </button>
          <a th:href="@{/spots}" class="btn btn-outline-secondary rounded-3"
            >リセット</a
          >
        </form>
      </div>

      <!-- スポット一覧 -->
      <div th:if="${#lists.isEmpty(spots)}" class="text-center text-muted py-5">
        <i class="bi bi-geo-alt display-4 d-block mb-2"></i>
        <p>
          スポットが見つかりません。「スポットを登録」から追加してください。
        </p>
      </div>

      <div class="row g-3">
        <div class="col-md-6 col-lg-4" th:each="spot : ${spots}">
          <div class="card h-100">
            <div class="card-body">
              <!-- カテゴリバッジ -->
              <span
                class="category-badge mb-2 d-inline-block"
                th:classappend="${spot.category.name() == 'SIGHTSEEING' ? 'bg-primary bg-opacity-10 text-primary'
                                        : spot.category.name() == 'RESTAURANT' ? 'bg-success bg-opacity-10 text-success'
                                        : spot.category.name() == 'ACCOMMODATION' ? 'bg-warning bg-opacity-10 text-warning'
                                        : 'bg-secondary bg-opacity-10 text-secondary'}"
                th:text="${spot.category.displayName}"
                >観光地</span
              >

              <h6 class="fw-bold mb-1" th:text="${spot.name}">栗林公園</h6>

              <p th:if="${spot.address}" class="text-muted small mb-1">
                <i class="bi bi-geo-alt me-1"></i
                ><span th:text="${spot.address}"></span>
              </p>
              <p
                th:if="${spot.description}"
                class="text-muted small text-truncate mb-0"
                th:text="${spot.description}"
              ></p>
            </div>
            <div class="card-footer bg-transparent border-0 d-flex gap-2 pt-0">
              <a
                th:href="@{/spots/{id}/edit(id=${spot.id})}"
                class="btn btn-sm btn-outline-primary rounded-3 flex-grow-1"
              >
                <i class="bi bi-pencil me-1"></i>編集
              </a>
              <form
                th:action="@{/spots/{id}/delete(id=${spot.id})}"
                method="post"
                onsubmit="return confirm('削除しますか？');"
              >
                <button
                  type="submit"
                  class="btn btn-sm btn-outline-danger rounded-3"
                >
                  <i class="bi bi-trash"></i>
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
